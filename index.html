<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 페어링 스튜디오</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f0ede8;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f8f7f5;
    }

    /* ── topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px 12px;
      border-bottom: 0.5px solid #eae5dc;
      background: #faf9f7;
      flex-shrink: 0;
      gap: 20px;
    }

    .logo-block { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .logo-main {
      font-size: 17px;
      font-weight: 600;
      color: #1e1009;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }
    .logo-date {
      font-size: 12px;
      font-weight: 400;
      color: #a08878;
      letter-spacing: 0.01em;
    }

    .tab-group { display: flex; gap: 6px; flex-shrink: 0; }
    .tab-pill {
      padding: 7px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid #ddd8d0;
      background: transparent;
      color: #bbb;
      transition: all .22s;
      font-family: 'Pretendard', sans-serif;
      white-space: nowrap;
    }
    .tab-pill.on { border-color: #2c1a0e; background: #2c1a0e; color: #fff; }
    .tab-pill:hover:not(.on) { border-color: #9a7a6a; color: #6a5040; background: #faf5f2; }

    .right-bar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .reset-btn {
      font-size: 12px;
      font-weight: 500;
      color: #9a7a6a;
      background: none;
      border: 1px solid #ddd8d0;
      border-radius: 100px;
      padding: 7px 16px;
      cursor: pointer;
      font-family: 'Pretendard', sans-serif;
      transition: all .2s;
      white-space: nowrap;
    }
    .reset-btn:hover { background: #f5efe8; border-color: #c8b8a8; color: #6a4a2a; }

    /* ── upload panel ── */
    .upload-panel {
      flex: 1;
      padding: 36px 48px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }
    .upload-box {
      border: 1.5px dashed #d8d2c8;
      border-radius: 14px;
      padding: 36px;
      text-align: center;
      cursor: pointer;
      background: #faf8f5;
      transition: all .25s;
    }
    .upload-box:hover { border-color: #7a4a20; background: #fff9f6; }
    .upload-icon { font-size: 32px; margin-bottom: 10px; }
    .upload-box p { font-size: 15px; color: #888; margin-bottom: 6px; font-weight: 400; }
    .upload-box small { font-size: 12px; color: #bbb; }

    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .row label { font-size: 13px; color: #666; white-space: nowrap; font-weight: 400; min-width: 64px; }
    .row select {
      flex: 1;
      min-width: 200px;
      padding: 9px 14px;
      border: 1px solid #d8d2c8;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Pretendard', sans-serif;
      color: #1a1010;
      background: #fff;
    }
    .go-btn {
      padding: 10px 24px;
      background: #2c1a0e;
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Pretendard', sans-serif;
      transition: all .2s;
      white-space: nowrap;
    }
    .go-btn:hover { background: #4a2c18; }
    .go-btn.alt { background: #7a4a20; }
    .go-btn.alt:hover { background: #9a6030; }

    .info-txt { font-size: 12px; color: #bbb; text-align: center; padding: 4px 0; font-weight: 300; }
    .ex-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .chip {
      font-size: 11.5px;
      background: #f0ece5;
      border-radius: 100px;
      padding: 4px 12px;
      color: #6a5040;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .chip button { border: none; background: none; cursor: pointer; color: #bbb; font-size: 15px; line-height: 1; padding: 0; }

    /* ── stage ── */
    .stage-outer {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: none;
    }
    .bubble-canvas {
      position: absolute;
      inset: 0;
    }
    .bsvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .bottom-hint {
      position: absolute;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12.5px;
      color: #c0bab2;
      font-weight: 300;
      letter-spacing: 0.04em;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <div class="logo-block">
      <div class="logo-main">오늘의 페어링 스튜디오</div>
      <div class="logo-date" id="logoDate">엑셀을 업로드해주세요</div>
    </div>
    <div class="tab-group">
      <button class="tab-pill on" onclick="switchTab('both',this)">키워드 + 좋은 일</button>
      <button class="tab-pill" onclick="switchTab('keyword',this)">키워드</button>
      <button class="tab-pill" onclick="switchTab('good',this)">최근 좋은 일</button>
    </div>
    <div class="right-bar">
      <button class="reset-btn" onclick="resetAll()">↺ 초기화</button>
    </div>
  </div>

  <!-- ── UPLOAD PANEL ── -->
  <div id="uploadPanel" class="upload-panel">
    <div class="upload-box" onclick="document.getElementById('xlFile').click()">
      <div class="upload-icon">📂</div>
      <p>스모어 엑셀 파일을 올려주세요</p>
      <small>.xlsx 파일 · Smore 시트 자동 인식</small>
      <input type="file" id="xlFile" accept=".xlsx,.xls" style="display:none" onchange="loadExcel(this)">
    </div>
    <div id="dateRow" class="row" style="display:none">
      <label>파티 날짜</label>
      <select id="dateSel" onchange="onDateChange()"></select>
      <button class="go-btn" onclick="startParty()">파티 시작 →</button>
    </div>
    <div id="exSection" style="display:none">
      <div class="row" style="margin-bottom:8px">
        <label>참가자 제외</label>
        <select id="personSel" style="flex:1;min-width:200px;padding:9px 14px;border:1px solid #d8d2c8;border-radius:10px;font-size:13px;font-family:'Pretendard',sans-serif;color:#1a1010;background:#fff"></select>
        <button class="go-btn alt" onclick="excludePerson()">제외</button>
      </div>
      <div class="ex-chips" id="exChips"></div>
    </div>
    <div id="infoTxt" class="info-txt">엑셀을 업로드하면 날짜별 참가자가 자동으로 분류됩니다</div>
  </div>

  <!-- ── BUBBLE STAGE ── -->
  <div id="stageOuter" class="stage-outer">
    <div class="bubble-canvas" id="bubbleCanvas">
      <svg class="bsvg" id="bsvg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="bottom-hint">버블을 터치하면 톡— 하고 터져요!</div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════
   CONSTANTS & STATE
════════════════════════════════════════════ */
var DAYS = ['일','월','화','수','목','금','토'];
var tab = 'both';
var allData = [], currentItems = [], dateMap = {};
var excluded = new Set();
var bubbles = [];
var animId = null;
var W = 800, H = 560;

/* ════════════════════════════════════════════
   SVG HELPERS
════════════════════════════════════════════ */
function nsEl(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}
function mkEl(tag, attrs) {
  var e = nsEl(tag);
  Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
  return e;
}
function addGrad(defs, id, type, attrObj, stops) {
  var g = nsEl(type);
  g.id = id;
  Object.keys(attrObj).forEach(function(k) { g.setAttribute(k, attrObj[k]); });
  g.innerHTML = stops;
  defs.appendChild(g);
}

/* ════════════════════════════════════════════
   DATE HELPERS
════════════════════════════════════════════ */
function normalizeDate(s) {
  // '4/3(금)' → '4월 3일(금)'
  s = s.replace(/^(\d+)\/(\d+)/, function(_, m, d) { return m + '월 ' + d + '일'; });
  // '3월 14일 (토)' → '3월 14일(토)' (공백 제거)
  s = s.replace(/\s*\(\s*([가-힣])\s*\)/, '($1)');
  return s.trim();
}

function formatDateLabel(s) {
  var m = s.match(/(\d+)월\s*(\d+)일/);
  if (m) {
    var d = new Date(2026, +m[1] - 1, +m[2]);
    return '2026년 ' + m[1] + '월 ' + m[2] + '일 ' + DAYS[d.getDay()] + '요일';
  }
  return s;
}

function dateSortKey(s) {
  var m = s.match(/(\d+)월\s*(\d+)일/);
  if (m) return +m[1] * 100 + +m[2];
  return 0;
}

function onDateChange() {
  var v = document.getElementById('dateSel').value;
  document.getElementById('logoDate').textContent = formatDateLabel(v);
}

/* ════════════════════════════════════════════
   EXCEL PARSING
════════════════════════════════════════════ */
function loadExcel(input) {
  var file = input.files[0];
  if (!file) return;
  document.getElementById('infoTxt').textContent = '파일 읽는 중...';
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, { type: 'binary' });
      var sn = wb.SheetNames.filter(function(n) { return n.indexOf('Smore') === 0; })[0] || wb.SheetNames[0];
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: '' });
      if (rows.length < 2) { document.getElementById('infoTxt').textContent = '데이터를 찾을 수 없습니다.'; return; }
      parseRows(rows);
    } catch(err) {
      document.getElementById('infoTxt').textContent = '파일 읽기 오류: ' + err.message;
    }
  };
  reader.readAsBinaryString(file);
}

function parseRows(rows) {
  allData = [];
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    // col I(8) = 날짜(신형/구형), col L(11) = 날짜(구형 백업)
    var dRaw = ((r[8] || '') + '' + (r[11] || '')).trim();
    if (!dRaw) continue;

    var date = '', gender = '';
    // 신형: "남성｜4/3(금) 19:30–22:00"
    var nf = dRaw.match(/^(남성|여성)[｜|]\s*(.+)/);
    if (nf) {
      gender = nf[1] === '남성' ? '남' : '여';
      date = nf[2].replace(/\s*\d{1,2}:\d{2}[-–]\d{1,2}:\d{2}.*$/, '').trim();
    } else {
      // 구형: "3월 6일 (금) 19:30" / "3월 28일(토) [잔여석...]"
      date = dRaw
        .replace(/\s+\d{1,2}:\d{2}.*$/, '')
        .replace(/\[잔여석.*?\]/g, '')
        .replace(/여성 마감/g, '')
        .trim();
      gender = (r[15] || '').toString().trim();
    }

    // 날짜 정규화 (공백/슬래시 통일)
    date = normalizeDate(date);
    if (!date) continue;

    var kw   = (r[17] || '').toString().trim();
    var good = (r[18] || '').toString().trim();
    var name = (r[21] || '').toString().trim() || ('참가자' + i);

    // 성별 정규화 ('남성' → '남', '여성' → '여')
    if (gender === '남성') gender = '남';
    if (gender === '여성') gender = '여';

    allData.push({ date: date, gender: gender, keyword: kw, good: good, name: name, row: i - 1 });
  }

  // 날짜별 그룹
  dateMap = {};
  allData.forEach(function(d) {
    if (!dateMap[d.date]) dateMap[d.date] = [];
    dateMap[d.date].push(d);
  });

  // 최신순 정렬
  var sorted = Object.keys(dateMap).sort(function(a, b) { return dateSortKey(b) - dateSortKey(a); });

  var sel = document.getElementById('dateSel');
  sel.innerHTML = '';
  sorted.forEach(function(dt) {
    var o = document.createElement('option');
    o.value = dt;
    o.textContent = dt + '  (' + dateMap[dt].length + '명)';
    sel.appendChild(o);
  });

  document.getElementById('dateRow').style.display = 'flex';
  document.getElementById('infoTxt').textContent = '총 ' + allData.length + '명 · ' + sorted.length + '개 날짜 인식됨';
  onDateChange();
}

/* ════════════════════════════════════════════
   PARTY START / EXCLUDE
════════════════════════════════════════════ */
function startParty() {
  var date = document.getElementById('dateSel').value;
  document.getElementById('logoDate').textContent = formatDateLabel(date);

  var people = (dateMap[date] || []).filter(function(p) { return !excluded.has(p.row); });
  var mN = 0, fN = 0;
  people = people.map(function(p) {
    var num = p.gender === '남' ? ++mN : ++fN;
    return Object.assign({}, p, { num: num });
  });
  currentItems = people;

  var ps = document.getElementById('personSel');
  ps.innerHTML = '';
  (dateMap[date] || []).forEach(function(p) {
    var o = document.createElement('option');
    o.value = p.row;
    o.textContent = p.gender + ' ' + p.name;
    ps.appendChild(o);
  });

  document.getElementById('exSection').style.display = 'block';
  document.getElementById('uploadPanel').style.display = 'none';
  document.getElementById('stageOuter').style.display = 'block';
  syncSize();
  resetAll();
}

function excludePerson() {
  var val = parseInt(document.getElementById('personSel').value);
  if (excluded.has(val)) return;
  excluded.add(val);
  var p = allData.filter(function(d) { return d.row === val; })[0];
  if (!p) return;
  var chip = document.createElement('div');
  chip.className = 'chip';
  chip.id = 'chip' + val;
  chip.innerHTML = p.gender + ' ' + p.name + ' <button onclick="reinclude(' + val + ')">×</button>';
  document.getElementById('exChips').appendChild(chip);
}

function reinclude(row) {
  excluded.delete(row);
  var c = document.getElementById('chip' + row);
  if (c) c.remove();
}

/* ════════════════════════════════════════════
   CANVAS SIZE
════════════════════════════════════════════ */
function syncSize() {
  var el = document.getElementById('bubbleCanvas');
  W = el.clientWidth || 800;
  H = el.clientHeight || 560;
  var svg = document.getElementById('bsvg');
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
}

/* ════════════════════════════════════════════
   TEXT WRAP
════════════════════════════════════════════ */
function wrapText(txt, r) {
  var fz = txt.length > 18 ? 9 : txt.length > 13 ? 10.5 : txt.length > 9 ? 11.5 : 12.5;
  var mc = Math.floor(r * 1.42 / (fz * 0.54));
  var words = txt.split(/\s+/);
  var lines = [], line = '';
  words.forEach(function(w) {
    var t = (line ? line + ' ' : '') + w;
    if (t.length > mc && line) { lines.push(line); line = w; }
    else line = t;
  });
  if (line) lines.push(line);
  return { lines: lines.slice(0, 3), fz: fz };
}

/* ════════════════════════════════════════════
   BUBBLE CLASS
════════════════════════════════════════════ */
function Bubble(id, text, gender, num, type) {
  this.id = id;
  this.text = text;
  this.gender = gender;
  this.num = num;
  this.type = type;
  this.r = 30 + Math.random() * 22;
  // 시작 위치: 화면 안 랜덤
  this.x = this.r * 1.5 + Math.random() * (W - this.r * 3);
  this.y = this.r * 1.5 + Math.random() * (H - this.r * 3);
  // 느린 속도
  var spd = 0.14 + Math.random() * 0.20;
  var ang = Math.random() * Math.PI * 2;
  this.vx = Math.cos(ang) * spd;
  this.vy = Math.sin(ang) * spd;
  this.mass = this.r * this.r;
  this.flipped = false;
  this.uid = 'b' + id + '_' + (Date.now() % 99999) + '_' + Math.floor(Math.random()*9999);
  this.el = null;
  this.frontEls = [];
  this.backG = null;
  this.textG = null;
  this.scale = 1;
}

Bubble.prototype.update = function() {
  if (this.flipped) return;
  this.x += this.vx;
  this.y += this.vy;
  // 벽 반사 (탱탱볼)
  if (this.x - this.r < 0)    { this.x = this.r;     this.vx =  Math.abs(this.vx); }
  if (this.x + this.r > W)    { this.x = W - this.r; this.vx = -Math.abs(this.vx); }
  if (this.y - this.r < 0)    { this.y = this.r;     this.vy =  Math.abs(this.vy); }
  if (this.y + this.r > H)    { this.y = H - this.r; this.vy = -Math.abs(this.vy); }
  // 아주 미세한 랜덤 드리프트 (자연스러운 부유감)
  this.vx += (Math.random() - 0.5) * 0.003;
  this.vy += (Math.random() - 0.5) * 0.003;
  // 속도 범위 제한
  var spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
  if (spd > 0.46) { this.vx = this.vx / spd * 0.46; this.vy = this.vy / spd * 0.46; }
  if (spd < 0.07) { var a = Math.random() * Math.PI * 2; this.vx = Math.cos(a) * 0.12; this.vy = Math.sin(a) * 0.12; }
  // DOM 업데이트
  if (this.el) this.el.setAttribute('transform', 'translate(' + this.x + ',' + this.y + ') scale(' + this.scale + ')');
};

Bubble.prototype.build = function(svg) {
  var uid = this.uid, r = this.r, self = this;
  var defs = svg.querySelector('defs');
  if (!defs) { defs = nsEl('defs'); svg.insertBefore(defs, svg.firstChild); }

  // ── 앞면 그라디언트 (비눗방울) ──
  addGrad(defs, 'lg' + uid, 'linearGradient', { x1:'12%', y1:'6%', x2:'88%', y2:'94%' },
    '<stop offset="0%" stop-color="#d8eeff" stop-opacity="0.50"/>' +
    '<stop offset="28%" stop-color="#eee4ff" stop-opacity="0.18"/>' +
    '<stop offset="54%" stop-color="#e0f4ff" stop-opacity="0.13"/>' +
    '<stop offset="78%" stop-color="#fff0e0" stop-opacity="0.20"/>' +
    '<stop offset="100%" stop-color="#ddd4f4" stop-opacity="0.36"/>');
  addGrad(defs, 'rg' + uid, 'radialGradient', { cx:'31%', cy:'24%', r:'38%' },
    '<stop offset="0%" stop-color="#fff" stop-opacity="0.96"/>' +
    '<stop offset="44%" stop-color="#e4f2ff" stop-opacity="0.38"/>' +
    '<stop offset="100%" stop-color="#fff" stop-opacity="0"/>');
  addGrad(defs, 'sg' + uid, 'radialGradient', { cx:'50%', cy:'50%', r:'50%' },
    '<stop offset="54%" stop-color="#a0c0e0" stop-opacity="0"/>' +
    '<stop offset="87%" stop-color="#80a8cc" stop-opacity="0.20"/>' +
    '<stop offset="100%" stop-color="#60a0cc" stop-opacity="0.40"/>');

  // ── 뒷면 그라디언트 (같은 비눗방울, 파랗게) ──
  addGrad(defs, 'bgl' + uid, 'linearGradient', { x1:'12%', y1:'6%', x2:'88%', y2:'94%' },
    '<stop offset="0%" stop-color="#c0dcff" stop-opacity="0.65"/>' +
    '<stop offset="30%" stop-color="#aac8f8" stop-opacity="0.38"/>' +
    '<stop offset="58%" stop-color="#b8d8ff" stop-opacity="0.32"/>' +
    '<stop offset="82%" stop-color="#aabcf0" stop-opacity="0.42"/>' +
    '<stop offset="100%" stop-color="#98b0ec" stop-opacity="0.56"/>');
  addGrad(defs, 'bgr' + uid, 'radialGradient', { cx:'31%', cy:'24%', r:'38%' },
    '<stop offset="0%" stop-color="#fff" stop-opacity="0.90"/>' +
    '<stop offset="48%" stop-color="#d0e4ff" stop-opacity="0.30"/>' +
    '<stop offset="100%" stop-color="#fff" stop-opacity="0"/>');
  addGrad(defs, 'bgs' + uid, 'radialGradient', { cx:'50%', cy:'50%', r:'50%' },
    '<stop offset="54%" stop-color="#80a8d8" stop-opacity="0"/>' +
    '<stop offset="87%" stop-color="#6090c8" stop-opacity="0.26"/>' +
    '<stop offset="100%" stop-color="#4078b8" stop-opacity="0.46"/>');

  // clipPath
  var cp = nsEl('clipPath'); cp.id = 'cp' + uid;
  cp.appendChild(mkEl('circle', { cx:'0', cy:'0', r: r - 1 }));
  defs.appendChild(cp);

  var g = nsEl('g'); g.style.cursor = 'pointer'; this.el = g;

  // 그림자
  var sh = mkEl('ellipse', { cx:'1', cy: r*0.14, rx: r*0.86, ry: r*0.16, fill:'#88aabb', 'fill-opacity':'0.06' });
  // 본체
  var base = mkEl('circle', { cx:'0', cy:'0', r: r, fill:'url(#lg'+uid+')', stroke:'#90b8d8', 'stroke-width':'0.8', 'stroke-opacity':'0.44' });
  var rim  = mkEl('circle', { cx:'0', cy:'0', r: r, fill:'url(#sg'+uid+')' });
  // 하이라이트
  var hl = mkEl('ellipse', { cx: -r*0.20, cy: -r*0.27, rx: r*0.25, ry: r*0.12, fill:'url(#rg'+uid+')', transform:'rotate(-36,'+(-r*0.20)+','+(-r*0.27)+')' });
  var gl = mkEl('circle',  { cx: r*0.27,  cy:  r*0.29, r: r*0.062, fill:'#fff', 'fill-opacity':'0.55' });
  var iri = mkEl('ellipse', { cx:'0', cy: r*0.58, rx: r*0.36, ry: r*0.09, fill:'#b8ddff', 'fill-opacity':'0.18' });
  // 타입 도트 (키워드=파랑, 좋은일=초록)
  var dot = mkEl('circle', { cx: r - 7, cy: -(r - 7), r: 3.2, fill: this.type === 'keyword' ? '#90b8d8' : '#88c888', 'fill-opacity':'0.75' });

  // 텍스트
  var wr = wrapText(this.text, r);
  var lh = wr.fz * 1.5, th = (wr.lines.length - 1) * lh;
  var tg = nsEl('g'); tg.setAttribute('clip-path', 'url(#cp' + uid + ')');
  wr.lines.forEach(function(l, li) {
    var t = nsEl('text');
    t.setAttribute('x', '0'); t.setAttribute('y', -th/2 + li*lh + wr.fz*0.4);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('font-family', "Pretendard, 'Apple SD Gothic Neo', sans-serif");
    t.setAttribute('font-size', wr.fz); t.setAttribute('font-weight', '400');
    t.setAttribute('fill', '#1a2535'); t.setAttribute('fill-opacity', '0.74');
    t.textContent = l; tg.appendChild(t);
  });
  this.textG = tg;

  // ── 뒷면 ──
  var bg = nsEl('g'); bg.style.display = 'none';
  var bc   = mkEl('circle', { cx:'0', cy:'0', r: r, fill:'url(#bgl'+uid+')', stroke:'#88b0d8', 'stroke-width':'0.9', 'stroke-opacity':'0.55' });
  var brim = mkEl('circle', { cx:'0', cy:'0', r: r, fill:'url(#bgs'+uid+')' });
  var bhl  = mkEl('ellipse', { cx: -r*0.20, cy: -r*0.27, rx: r*0.25, ry: r*0.12, fill:'url(#bgr'+uid+')', transform:'rotate(-36,'+(-r*0.20)+','+(-r*0.27)+')' });
  var bgl2 = mkEl('circle',  { cx: r*0.27, cy: r*0.29, r: r*0.062, fill:'#fff', 'fill-opacity':'0.44' });
  var biri2 = mkEl('ellipse', { cx:'0', cy: r*0.58, rx: r*0.36, ry: r*0.09, fill:'#b8d4f4', 'fill-opacity':'0.24' });

  var fs  = Math.min(r * 0.31, 14);
  var fs2 = Math.min(r * 0.20, 10.5);
  var bn = nsEl('text');
  bn.setAttribute('x','0'); bn.setAttribute('y', -fs*0.55);
  bn.setAttribute('text-anchor','middle'); bn.setAttribute('dominant-baseline','middle');
  bn.setAttribute('font-family', "Pretendard, sans-serif");
  bn.setAttribute('font-size', fs); bn.setAttribute('font-weight','700'); bn.setAttribute('fill','#1a2c4a');
  bn.textContent = this.gender + '성 ' + this.num + '호';

  var bs = nsEl('text');
  bs.setAttribute('x','0'); bs.setAttribute('y', fs * 0.72);
  bs.setAttribute('text-anchor','middle'); bs.setAttribute('dominant-baseline','middle');
  bs.setAttribute('font-family', "Pretendard, sans-serif");
  bs.setAttribute('font-size', fs2); bs.setAttribute('font-weight','300'); bs.setAttribute('fill','#2a4060'); bs.setAttribute('fill-opacity','0.72');
  bs.textContent = this.text.length > 18 ? this.text.slice(0, 17) + '…' : this.text;

  bg.appendChild(bc); bg.appendChild(brim); bg.appendChild(bhl); bg.appendChild(bgl2); bg.appendChild(biri2);
  bg.appendChild(bn); bg.appendChild(bs);
  this.backG = bg;

  this.frontEls = [sh, base, rim, hl, gl, iri, dot];
  g.appendChild(sh); g.appendChild(base); g.appendChild(rim); g.appendChild(hl); g.appendChild(gl); g.appendChild(iri);
  g.appendChild(dot); g.appendChild(tg); g.appendChild(bg);

  g.addEventListener('click', function() { self.pop(svg); });
  g.setAttribute('transform', 'translate(' + this.x + ',' + this.y + ')');
  svg.appendChild(g);
};

Bubble.prototype.pop = function(svg) {
  if (this.flipped) return;
  this.flipped = true;
  this.vx = 0; this.vy = 0;
  var self = this;

  // 파티클 버스트
  for (var p = 0; p < 14; p++) {
    (function(pi) {
      var ang = (pi / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
      var spd = self.r * (0.038 + Math.random() * 0.068);
      var c = nsEl('circle');
      c.setAttribute('cx', self.x); c.setAttribute('cy', self.y);
      c.setAttribute('r', 1.5 + Math.random() * 2.8);
      var cols = ['#a8ccee','#c0d8f4','#d4e8f8','#b0ccec','#cce0f8','#e0eef8'];
      c.setAttribute('fill', cols[pi % cols.length]);
      c.setAttribute('fill-opacity', '0.82');
      svg.appendChild(c);
      var vx = Math.cos(ang) * spd, vy = Math.sin(ang) * spd, alpha = 0.82;
      var tick = function() {
        var cx = +c.getAttribute('cx'), cy = +c.getAttribute('cy');
        vx *= 0.91; vy = vy * 0.91 + 0.20; alpha -= 0.040;
        c.setAttribute('cx', cx + vx); c.setAttribute('cy', cy + vy);
        c.setAttribute('fill-opacity', Math.max(0, alpha).toFixed(3));
        if (alpha > 0) requestAnimationFrame(tick); else c.remove();
      };
      requestAnimationFrame(tick);
    })(p);
  }

  // 팝 애니메이션: 쪼그라들었다가 다시 부풀어오름
  var sc = 1, phase = 'shrink';
  var anim = function() {
    if (phase === 'shrink') {
      sc -= 0.13;
      if (sc <= 0.01) {
        sc = 0; phase = 'grow';
        self.textG.style.display = 'none';
        self.frontEls.forEach(function(e) {
          e.setAttribute('fill-opacity', '0');
          e.setAttribute('stroke-opacity', '0');
        });
        self.backG.style.display = 'block';
      }
    } else {
      sc += 0.09;
      if (sc >= 1) sc = 1;
    }
    self.scale = sc;
    if (self.el) self.el.setAttribute('transform', 'translate(' + self.x + ',' + self.y + ') scale(' + sc + ')');
    if (sc < 1 || phase === 'shrink') requestAnimationFrame(anim);
  };
  requestAnimationFrame(anim);
};

/* ════════════════════════════════════════════
   COLLISION RESOLUTION (탄성 충돌 / 질량 기반)
════════════════════════════════════════════ */
function resolveCollisions() {
  for (var i = 0; i < bubbles.length; i++) {
    var a = bubbles[i]; if (a.flipped) continue;
    for (var j = i + 1; j < bubbles.length; j++) {
      var b = bubbles[j]; if (b.flipped) continue;
      var dx = b.x - a.x, dy = b.y - a.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var minD = a.r + b.r;
      if (dist < minD && dist > 0.01) {
        // 겹침 분리
        var ov = (minD - dist) / 2;
        var nx = dx / dist, ny = dy / dist;
        a.x -= nx * ov; a.y -= ny * ov;
        b.x += nx * ov; b.y += ny * ov;
        // 탄성 충돌 (질량 가중)
        var dvx = a.vx - b.vx, dvy = a.vy - b.vy;
        var dot = dvx * nx + dvy * ny;
        if (dot > 0) {
          var ma = a.mass, mb = b.mass, tot = ma + mb;
          var imp = 2 * dot / tot;
          var damp = 0.93; // 약간의 에너지 흡수로 부드러운 느낌
          a.vx = (a.vx - imp * mb * nx) * damp;
          a.vy = (a.vy - imp * mb * ny) * damp;
          b.vx = (b.vx + imp * ma * nx) * damp;
          b.vy = (b.vy + imp * ma * ny) * damp;
          // 충돌 후 최소 속도 보장
          [a, b].forEach(function(x) {
            var s = Math.sqrt(x.vx * x.vx + x.vy * x.vy);
            if (s < 0.08) {
              var scale = 0.10 / Math.max(s, 0.001);
              x.vx *= scale; x.vy *= scale;
            }
          });
        }
        // 벽 범위 재클램프
        a.x = Math.max(a.r, Math.min(W - a.r, a.x));
        a.y = Math.max(a.r, Math.min(H - a.r, a.y));
        b.x = Math.max(b.r, Math.min(W - b.r, b.x));
        b.y = Math.max(b.r, Math.min(H - b.r, b.y));
      }
    }
  }
}

/* ════════════════════════════════════════════
   MAIN LOOP
════════════════════════════════════════════ */
function startLoop() {
  function loop() {
    bubbles.forEach(function(b) { b.update(); });
    resolveCollisions();
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════
   RESET & SPREAD
════════════════════════════════════════════ */
function spreadBubbles() {
  // 시작 시 겹침 없애기 (반복 분리)
  for (var iter = 0; iter < 100; iter++) {
    for (var i = 0; i < bubbles.length; i++) {
      var a = bubbles[i];
      for (var j = i + 1; j < bubbles.length; j++) {
        var b = bubbles[j];
        var dx = b.x - a.x, dy = b.y - a.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        var mn = a.r + b.r + 2;
        if (d < mn && d > 0.01) {
          var ov = (mn - d) / 2, nx = dx/d, ny = dy/d;
          a.x -= nx * ov; a.y -= ny * ov;
          b.x += nx * ov; b.y += ny * ov;
          a.x = Math.max(a.r, Math.min(W - a.r, a.x));
          a.y = Math.max(a.r, Math.min(H - a.r, a.y));
          b.x = Math.max(b.r, Math.min(W - b.r, b.x));
          b.y = Math.max(b.r, Math.min(H - b.r, b.y));
        }
      }
    }
  }
}

function switchTab(t, btn) {
  tab = t;
  document.querySelectorAll('.tab-pill').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  resetAll();
}

function resetAll() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  var svg = document.getElementById('bsvg');
  svg.innerHTML = '';
  bubbles = [];
  syncSize();

  var items = currentItems.length ? currentItems : DEMO;
  var id = 0;
  items.forEach(function(p) {
    if (tab === 'both' || tab === 'keyword') {
      if (p.keyword) bubbles.push(new Bubble(id++, p.keyword, p.gender, p.num, 'keyword'));
    }
    if (tab === 'both' || tab === 'good') {
      if (p.good) bubbles.push(new Bubble(id++, p.good, p.gender, p.num, 'good'));
    }
  });

  spreadBubbles();
  bubbles.forEach(function(b) { b.build(svg); });
  startLoop();
}
